{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 60vh;">
    <div class="col-md-8 text-center">
        <h1 class="display-1 fw-bold text-primary">404</h1>
        <h2 class="mb-3">¡Página no encontrada!</h2>
        <p class="lead text-muted mb-4">
            Lo sentimos, la página que estás buscando no existe, ha sido eliminada o la dirección es incorrecta.
        </p>
        <div class="d-flex justify-content-center gap-3">
            <a href="{% url 'panel_control' %}" class="btn btn-primary btn-lg">Volver al Panel</a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary btn-lg">Regresar</a>
        </div>
    </div>
</div>
{% endblock %}
