{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Clínica VitalCare</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="{% static 'css/custom.css' %}?v=3.0">
</head>
<body class="login-page">
    <div class="container">
        <div class="row justify-content-center px-3">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                <div class="card login-card border-0">
                    <div class="login-header">
                        <h3>VitalCare 🏥</h3>
                        <small class="text-white-50">Sistema de Gestión Clínica</small>
                    </div>
                    <div class="card-body p-4 p-md-5">
                        <form method="post" action="{% url 'login' %}">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label fw-bold">Usuario</label>
                                <input type="text" name="username" class="form-control custom-input" placeholder="Ej: n.andrea" required autofocus>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold">Contraseña</label>
                                <input type="password" name="password" class="form-control custom-input" placeholder="••••••••" required>
                            </div>
                            
                            <button type="submit" class="btn btn-panel w-100 py-2 fw-bold">Ingresar al Portal</button>

                            {% if form.errors %}
                            <div class="alert alert-danger mt-4 small" role="alert">
                                <b>Error:</b> Usuario o contraseña incorrectos.
                            </div>
                            {% endif %}
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
